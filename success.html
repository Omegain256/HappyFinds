<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Thank You for Contacting Us | HappyFinds</title>
<meta name="description" content="Your HappyFinds message has been received. We will reach out soon to discuss your AI video production needs.">
<meta name="author" content="HappyFinds">

<!-- Google tag (gtag.js) -->

  gtag('config', 'G-MCJ8ZT1R4X');

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; }
* { margin: 0; }

:root {
  --bg: oklch(100% 0 0);
  --sun: oklch(92% 0.16 97);
  --sun-soft: oklch(96% 0.07 98);
  --pink: oklch(74% 0.19 355);
  --coral: oklch(67% 0.2 30);
  --accent-text: oklch(40% 0.16 30);
  --aqua: oklch(78% 0.15 185);
  --mint: oklch(92% 0.09 160);
  --ink: oklch(21% 0.04 70);
  --ink-2: oklch(34% 0.045 70);
  --white: oklch(100% 0 0);
  --shadow-tight: 0 4px 8px oklch(42% 0.08 60 / 0.11);
  --radius: 14px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-6: 24px;
  --space-8: 32px;
  --space-12: 48px;
  --font-display: "Archivo Black", Impact, system-ui, sans-serif;
  --font-body: "Manrope", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

html {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 16px;
}

body {
  min-width: 320px;
  min-height: 100vh;
  background:
    linear-gradient(90deg, oklch(88% 0.06 100 / 0.22) 1px, transparent 1px),
    linear-gradient(0deg, oklch(88% 0.06 100 / 0.22) 1px, transparent 1px),
    var(--bg);
  background-size: 42px 42px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

h1 {
  max-width: 9ch;
  font-family: var(--font-display);
  font-size: clamp(3.8rem, 13vw, 6rem);
  font-weight: 400;
  line-height: 0.94;
  letter-spacing: -0.025em;
  text-transform: uppercase;
  text-wrap: balance;
}

p { text-wrap: pretty; }
a { color: inherit; }

.site-nav {
  min-height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4);
  padding: var(--space-3) clamp(var(--space-4), 5vw, var(--space-12));
  background: oklch(99% 0.015 105 / 0.92);
  border-bottom: 2px solid var(--ink);
  backdrop-filter: blur(16px);
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-family: var(--font-display);
  font-size: clamp(1.05rem, 2vw, 1.4rem);
  line-height: 1;
  text-decoration: none;
  text-transform: uppercase;
}

.brand-mark {
  width: 30px;
  height: 30px;
  display: grid;
  place-items: center;
  border: 2px solid var(--ink);
  border-radius: 50%;
  background: var(--sun);
  color: var(--coral);
  box-shadow: var(--shadow-tight);
}

.btn {
  display: inline-flex;
  min-height: 46px;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  padding: 0.78rem 1.15rem;
  border: 2px solid var(--ink);
  border-radius: 999px;
  background: var(--white);
  color: var(--ink);
  font: 800 0.9rem/1 var(--font-body);
  text-decoration: none;
  cursor: pointer;
  box-shadow: var(--shadow-tight);
}

.btn-primary { background: var(--coral); color: var(--ink); }
.btn-sun { background: var(--sun); }

.success {
  min-height: auto;
  display: grid;
  place-items: center;
  padding: clamp(56px, 7vw, 88px) var(--space-4);
  background: var(--sun-soft);
}

.success-card {
  width: min(100%, 720px);
  padding: 48px;
  padding: clamp(var(--space-8), 6vw, 64px);
  border: 0;
  border-radius: var(--radius);
  background: var(--white);
  box-shadow: 0 0 0 2px var(--ink), 12px 12px 0 var(--ink);
}

.success-mark {
  width: 72px;
  height: 72px;
  display: grid;
  place-items: center;
  margin-bottom: var(--space-6);
  border: 2px solid var(--ink);
  border-radius: 50%;
  background: var(--mint);
  color: var(--ink);
  font-size: 2rem;
  font-weight: 900;
}

.success p {
  max-width: 52ch;
  margin-top: var(--space-6);
  color: var(--ink-2);
  font-size: clamp(1rem, 1.4vw, 1.16rem);
  font-weight: 650;
}

.success-actions {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-3);
  margin-top: var(--space-8);
}

:focus-visible {
  outline: 3px solid var(--aqua);
  outline-offset: 3px;
}

@media (max-width: 680px) {
  .site-nav .btn { padding-inline: 0.9rem; }
  .success-card { box-shadow: 8px 8px 0 var(--ink); }
  h1 { font-size: clamp(3.2rem, 18vw, 5rem); }
}
</style>
</head>
<body>
<nav class="site-nav" aria-label="Primary navigation">
  <a href="index.html" class="brand" aria-label="HappyFinds home"><span class="brand-mark">*</span> HappyFinds</a>
  <a href="contact.html" class="btn btn-primary">Book a call</a>
</nav>

<main class="success">
  <section class="success-card" aria-labelledby="success-title">
    <div class="success-mark" aria-hidden="true">✓</div>
    <h1 id="success-title">You're on the list</h1>
    <p>Thanks for reaching out. We received your details and will follow up within one business day with next steps for your AI video sprint.</p>
    <div class="success-actions">
      <a href="index.html" class="btn btn-sun">Back home</a>
      <a href="contact.html" class="btn">Send another brief</a>
    </div>
  </section>
</main>
</body>
</html>
